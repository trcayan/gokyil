<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sayfa Bulunamadı (404) | Gök Yıl İnşaat</title>
<meta name="robots" content="noindex, follow"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#0f0f1a,#1a0a05);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;padding:20px;}
.box{text-align:center;max-width:500px;}
.num{font-size:120px;font-weight:900;color:#E84B1A;line-height:1;margin-bottom:10px;}
h1{font-size:24px;font-weight:700;margin-bottom:12px;}
p{color:#aaa;font-size:15px;line-height:1.7;margin-bottom:28px;}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn{padding:13px 24px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;transition:all .2s;}
.btn-red{background:#E84B1A;color:#fff;}
.btn-red:hover{background:#c03d12;}
.btn-out{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.3);}
.btn-out:hover{border-color:#E84B1A;color:#E84B1A;}
</style>
</head>
<body>
<div class="box">
  <div class="num">404</div>
  <h1>Sayfa Bulunamadı</h1>
  <p>Aradığınız sayfa taşınmış, silinmiş veya hiç var olmamış olabilir. Ana sayfaya dönerek devam edebilirsiniz.</p>
  <div class="btns">
    <a href="/" class="btn btn-red">🏠 Ana Sayfaya Dön</a>
    <a href="/iletisim.html" class="btn btn-out">📞 İletişim</a>
  </div>
</div>
</body>
</html>
